version: "3.8"

services:
  gateway:
    build: .
    ports:
      - "8400:8400"
    environment:
      - CHAIN_ID=clawchain-1
      - NODE_URL=tcp://host.docker.internal:26657
      - GATEWAY_KEY_NAME=gateway-operational
      - GATEWAY_HOME=/app/.clawchain-gateway
      - DATABASE_URL=sqlite:///./data/gateway.db
      - GATEWAY_BASE_URL=https://api.clawchain.vsa.co.za
      - LOG_LEVEL=INFO
    volumes:
      - gateway-data:/app/data
      - gateway-keys:/app/.clawchain-gateway
    restart: unless-stopped

volumes:
  gateway-data:
  gateway-keys:
