# ClawChain Nginx Reverse Proxy Configuration
# Place in /etc/nginx/sites-available/clawchain and symlink to sites-enabled

# RPC endpoint
server {
    listen 443 ssl;
    server_name rpc.clawchain.vsa.co.za;

    ssl_certificate /etc/letsencrypt/live/rpc.clawchain.vsa.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpc.clawchain.vsa.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:26657;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# REST API endpoint
server {
    listen 443 ssl;
    server_name api.clawchain.vsa.co.za;

    ssl_certificate /etc/letsencrypt/live/api.clawchain.vsa.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.clawchain.vsa.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:1317;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers for dashboard/bots
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

# Main domain - Dashboard
server {
    listen 443 ssl;
    server_name clawchain.vsa.co.za;

    ssl_certificate /etc/letsencrypt/live/clawchain.vsa.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clawchain.vsa.co.za/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/clawchain/dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve install script
    location /install.sh {
        alias /opt/clawchain/become-validator.sh;
        default_type text/plain;
    }
}

# HTTP redirect
server {
    listen 80;
    server_name clawchain.vsa.co.za rpc.clawchain.vsa.co.za api.clawchain.vsa.co.za;
    return 301 https://$host$request_uri;
}
