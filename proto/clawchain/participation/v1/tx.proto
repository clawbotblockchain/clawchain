syntax = "proto3";

package clawchain.participation.v1;

import "amino/amino.proto";
import "clawchain/participation/v1/params.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";

option go_package = "github.com/clawbotblockchain/clawchain/x/participation/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse) {
    option (google.api.http) = {
      post: "/clawbotblockchain/clawchain/participation/v1/update-params"
      body: "*"
    };
  }

  // ClaimRewards defines the ClaimRewards RPC.
  rpc ClaimRewards(MsgClaimRewards) returns (MsgClaimRewardsResponse) {
    option (google.api.http) = {
      post: "/clawbotblockchain/clawchain/participation/v1/claim-rewards"
      body: "*"
    };
  }

  // RegisterWorker registers a new worker for participation rewards.
  rpc RegisterWorker(MsgRegisterWorker) returns (MsgRegisterWorkerResponse) {
    option (google.api.http) = {
      post: "/clawbotblockchain/clawchain/participation/v1/register-worker"
      body: "*"
    };
  }

  // WorkerHeartbeat sends a heartbeat to prove the worker is active.
  rpc WorkerHeartbeat(MsgWorkerHeartbeat) returns (MsgWorkerHeartbeatResponse) {
    option (google.api.http) = {
      post: "/clawbotblockchain/clawchain/participation/v1/heartbeat"
      body: "*"
    };
  }

  // UnregisterWorker marks a worker as inactive.
  rpc UnregisterWorker(MsgUnregisterWorker) returns (MsgUnregisterWorkerResponse) {
    option (google.api.http) = {
      post: "/clawbotblockchain/clawchain/participation/v1/unregister-worker"
      body: "*"
    };
  }

  // ClaimWorkerRewards claims unclaimed worker rewards.
  rpc ClaimWorkerRewards(MsgClaimWorkerRewards) returns (MsgClaimWorkerRewardsResponse) {
    option (google.api.http) = {
      post: "/clawbotblockchain/clawchain/participation/v1/claim-worker-rewards"
      body: "*"
    };
  }

  // ReactivateWorker reactivates a previously deactivated worker. Self-service: the worker signs.
  rpc ReactivateWorker(MsgReactivateWorker) returns (MsgReactivateWorkerResponse) {
    option (google.api.http) = {
      post: "/clawbotblockchain/clawchain/participation/v1/reactivate-worker"
      body: "*"
    };
  }
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "clawchain/x/participation/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.

  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgClaimRewards defines the MsgClaimRewards message.
message MsgClaimRewards {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgClaimRewardsResponse defines the MsgClaimRewardsResponse message.
message MsgClaimRewardsResponse {
  string claimed_amount = 1;
}

// MsgRegisterWorker registers a new worker.
message MsgRegisterWorker {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string name = 2;
}

// MsgRegisterWorkerResponse is the response for RegisterWorker.
message MsgRegisterWorkerResponse {}

// MsgWorkerHeartbeat sends a heartbeat from a worker.
message MsgWorkerHeartbeat {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgWorkerHeartbeatResponse is the response for WorkerHeartbeat.
message MsgWorkerHeartbeatResponse {}

// MsgUnregisterWorker marks a worker as inactive.
message MsgUnregisterWorker {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgUnregisterWorkerResponse is the response for UnregisterWorker.
message MsgUnregisterWorkerResponse {}

// MsgClaimWorkerRewards claims unclaimed worker rewards.
message MsgClaimWorkerRewards {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgClaimWorkerRewardsResponse is the response for ClaimWorkerRewards.
message MsgClaimWorkerRewardsResponse {
  string claimed_amount = 1;
}

// MsgReactivateWorker reactivates a previously deactivated worker.
message MsgReactivateWorker {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgReactivateWorkerResponse is the response for ReactivateWorker.
message MsgReactivateWorkerResponse {}
